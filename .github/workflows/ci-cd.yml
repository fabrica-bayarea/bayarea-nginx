name: CI/CD - Nginx Gateway

on:
  push:
    branches: [main]
    paths:
      - 'nginx/**'
      - 'Dockerfile'
      - 'k8s/**'
      - '.github/workflows/ci-cd.yml'

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    name: "Build & Deploy Nginx"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.BAYAREA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - id: meta
        run: echo "tag=${{ steps.ecr-login.outputs.registry }}/bayarea-nginx-prod:${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/bayarea-nginx-prod:latest

      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
          kubectl set image deployment/bayarea-nginx \
            nginx=${{ steps.meta.outputs.tag }} -n bayarea-web
          kubectl rollout status deployment/bayarea-nginx -n bayarea-web --timeout=300s
