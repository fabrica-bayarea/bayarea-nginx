# bayarea.dataiesb.com gateway
resolver kube-dns.kube-system.svc.cluster.local valid=5s;

server {
    listen 80;

    set $backend_prod http://bayarea-prontuario-backend.bayarea-web.svc.cluster.local:3001;
    set $frontend_prod http://bayarea-prontuario-frontend.bayarea-web.svc.cluster.local:80;
    set $backend_dev http://bayarea-prontuario-backend-dev.bayarea-web.svc.cluster.local:3001;
    set $frontend_dev http://bayarea-prontuario-frontend-dev.bayarea-web.svc.cluster.local:80;

    set $sprint_backend http://bayarea-sprint-backend.bayarea-web.svc.cluster.local:3000;
    set $sprint_frontend http://bayarea-sprint-frontend.bayarea-web.svc.cluster.local:3000;

    # Prontuario - Prod backend
    location /prontuario/api/ {
        rewrite ^/prontuario/api/(.*) /api/$1 break;
        proxy_pass $backend_prod;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Prontuario - Prod frontend
    location /prontuario/ {
        rewrite ^/prontuario/(.*) /$1 break;
        proxy_pass $frontend_prod;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Prontuario - Dev backend
    location /prontuario-dev/api/ {
        rewrite ^/prontuario-dev/api/(.*) /api/$1 break;
        proxy_pass $backend_dev;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Prontuario - Dev frontend
    location /prontuario-dev/ {
        rewrite ^/prontuario-dev/(.*) /$1 break;
        proxy_pass $frontend_dev;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Sprint-Tracker - Backend API
    location /sprint/api/ {
        rewrite ^/sprint/api/(.*) /$1 break;
        proxy_pass $sprint_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Sprint-Tracker - Frontend
    location /sprint/ {
        rewrite ^/sprint/(.*) /$1 break;
        proxy_pass $sprint_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static pages
    location /tutor {
        alias /usr/share/nginx/html/tutor;
        index index.html;
    }

    # Root landing page
    location / {
        alias /usr/share/nginx/html/prontuario/;
        index index.html;
    }
}
